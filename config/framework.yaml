#     #   B.3+B.4:         { rules: [B.3, B.3.1, B.3.2, B.3.3, B.4, B.4.1, B.4.2] }
#     #   B.5:             { rules: [B.5, B.5.1, B.5.2, B.5.3, B.5.4, B.5.5] }
